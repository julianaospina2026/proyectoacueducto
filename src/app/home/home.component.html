<!-- NAVBAR -->
<header class="navbar">
    <h2>Acueducto Primavera</h2>
    <nav>
    <a routerLink="/">Inicio</a>
    <a routerLink="/servicios">Servicios</a>
    <a routerLink="/noticias">Noticias</a>
    <a routerLink="/contacto">Contacto</a>
</nav>
</header>

<!-- HERO -->
<section class="hero">
    <div class="hero-text">
    <div class="hero-content">
        <h1>El agua de vida</h1>
        <p>Gestión eficiente del recurso hídrico</p>
        <button>Ver más</button>
    </div>
</div>
</section><!-- SERVICIOS -->
<section class="section">
    <h2>Servicios</h2>
    <div class="grid">
        <div class="card" *ngFor="let item of servicios"> <img [src]="item.img" />
            <h3>{{ item.titulo }}</h3>
            <p>{{ item.descripcion }}</p>
        </div>
    </div>
</section><!-- NOTICIAS -->
<section class="section alt">
    <h2>Noticias</h2>
    <div class="grid">
        <div class="card" *ngFor="let n of noticias"> <img [src]="n.img" />
            <h3>{{ n.titulo }}</h3>
        </div>
    </div>
</section><!-- FOOTER -->
<footer>
    <p>© 2026 Acueducto Primavera</p>
</footer>
